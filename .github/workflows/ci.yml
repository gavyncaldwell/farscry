name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build shared package
        run: npm run build --workspace=@farscry/shared

      - name: Typecheck signaling server
        run: npm run typecheck --workspace=@farscry/signaling

      - name: Lint signaling server
        run: npm run lint --workspace=@farscry/signaling

  test-server:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build shared package
        run: npm run build --workspace=@farscry/shared

      - name: Run server tests
        run: npm run test --workspace=@farscry/signaling

  build-ios:
    runs-on: macos-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          working-directory: apps/mobile

      - name: Install CocoaPods
        working-directory: apps/mobile/ios
        run: bundle exec pod install

      - name: Build iOS
        working-directory: apps/mobile
        run: |
          xcodebuild \
            -workspace ios/Farscry.xcworkspace \
            -scheme Farscry \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            build \
            CODE_SIGNING_ALLOWED=NO

  build-android:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Build Android
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug
